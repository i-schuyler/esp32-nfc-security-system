; platformio.ini
; ESP32 NFC Security System (V1)
; M0 scaffolding: build plumbing + embedded SPA from flash + status API

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
monitor_filters = log2file 

; File system for embedded SPA
board_build.filesystem = littlefs

; Conservative flags (avoid surprise behavior)
build_flags =
  -D WSS_FEATURE_WIFI=1
  -D WSS_FEATURE_WEB=1
  -D WSS_FEATURE_NFC=1
  -D WSS_FEATURE_SD=1
  -D WSS_FEATURE_RTC=1

lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit PN532@1.3.4
  adafruit/Adafruit BusIO@1.17.4
  greiman/SdFat@2.2.2
  adafruit/RTClib@^2.1.4

; NOTE:
; - Upload firmware: pio run -t upload
; - Upload web UI (LittleFS): pio run -t uploadfs

[env:esp32-s3-devkitc-1-n32r16v]
platform = espressif32
board = esp32-s3-devkitc-1-n32r16v
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions/partitions_32mb.csv
monitor_filters = log2file

; File system for embedded SPA
board_build.filesystem = littlefs

; Force correct memory layout for N32R16 (32MB flash + OPI PSRAM)
board_upload.flash_size = 32MB
board_build.flash_mode = opi
board_build.arduino.memory_type = opi_opi
board_build.psram_type = opi

; Conservative flags (avoid surprise behavior)
build_flags =
  -D WSS_FEATURE_WIFI=1
  -D WSS_FEATURE_WEB=1
  -D WSS_FEATURE_NFC=1
  -D WSS_FEATURE_SD=1
  -D WSS_FEATURE_RTC=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1

lib_deps =
  bblanchon/ArduinoJson@^7.0.4
  adafruit/Adafruit PN532@1.3.4
  adafruit/Adafruit BusIO@1.17.4
  greiman/SdFat@2.2.2
  adafruit/RTClib@^2.1.4

[env:diagnostic_esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:tools/pio_set_srcdir.py
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_flags =
  -D WSS_DIAGNOSTIC=1
  -D WSS_DIAG_TARGET_ESP32S3=0
  -D WSS_DIAG_I2C_SDA=21
  -D WSS_DIAG_I2C_SCL=22
  -D WSS_DIAG_SPI_SCK=18
  -D WSS_DIAG_SPI_MISO=19
  -D WSS_DIAG_SPI_MOSI=23
  -D WSS_DIAG_SD_CS=13
  -D WSS_DIAG_PN532_UART_RX=16
  -D WSS_DIAG_PN532_UART_TX=17
lib_deps =
  greiman/SdFat@2.2.2

[env:diagnostic_esp32s3]
platform = espressif32
upload_port = COM10
monitor_port = COM10

; We override flash/PSRAM settings below to match N32R16 even if board id is generic.
board = esp32-s3-devkitc-1-n32r16v
framework = arduino
monitor_speed = 115200
extra_scripts = pre:tools/pio_set_srcdir.py

board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Force correct memory layout for N32R16 (32MB flash + OPI PSRAM)
board_upload.flash_size = 32MB
board_build.flash_mode = opi
board_build.arduino.memory_type = opi_opi
board_build.psram_type = opi

build_flags =
  -D WSS_DIAGNOSTIC=1
  -D WSS_DIAG_TARGET_ESP32S3=1
  ; Set to 1 to halt immediately after Step 1 for heap-corruption isolation.
  ; -D WSS_DIAG_STOP_AFTER_STEP1=1
  ; Set to 0 to skip any partition reads/checksums (metadata only).
  -D WSS_DIAG_PARTITION_READS=0
  ; Set to 0 to skip the entire partition enumeration loop.
  -D WSS_DIAG_PARTITION_ENUM=0
  ; Set to 1 to skip PN532 UART test prompts/handshake.
  ; -D WSS_DIAG_SKIP_PN532=1
  -D BOARD_HAS_PSRAM
  -D WSS_DIAG_I2C_SDA=8
  -D WSS_DIAG_I2C_SCL=9
  -D WSS_DIAG_SPI_SCK=12
  -D WSS_DIAG_SPI_MISO=11
  -D WSS_DIAG_SPI_MOSI=10
  -D WSS_DIAG_SD_CS=13
  ; UART defaults target TXD/RXD header pins on common ESP32-S3 dev kits (verify for Waveshare).
  -D WSS_DIAG_PN532_UART_RX=44
  -D WSS_DIAG_PN532_UART_TX=43

lib_deps =
  greiman/SdFat@2.2.2
